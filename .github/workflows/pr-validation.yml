name: PR Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  commit-lint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check conventional commits
        run: |
          COMMITS=$(git log --format='%s' origin/main..HEAD)
          PATTERN='^(feat|fix|refactor|test|docs|ci|chore|perf|security)\((frontend|backend|pipeline|db|infra|ci|docs)\): .+'
          FAILED=0
          echo "$COMMITS" | while IFS= read -r msg; do
            if [ -n "$msg" ] && ! echo "$msg" | grep -qE "$PATTERN"; then
              echo "::error::Invalid commit message: '$msg'"
              echo "Expected: type(scope): description"
              exit 1
            fi
          done

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check for hardcoded credential patterns
        run: |
          PATTERNS=(
            'AKIA[0-9A-Z]{16}'
            'sk-[a-zA-Z0-9]{40,}'
            'password\s*=\s*["\x27][^"\x27]{4,}'
          )
          for pattern in "${PATTERNS[@]}"; do
            if grep -rn --include='*.py' --include='*.js' --include='*.ts' --include='*.jsx' --include='*.tsx' -E "$pattern" . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=venv --exclude='*.example' --exclude='*.md'; then
              echo "::error::Potential secret detected"
              exit 1
            fi
          done
          echo "No hardcoded secrets detected"

  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check for backend changes
        id: changes
        run: |
          if git diff --name-only origin/main...HEAD | grep -qE '^(backend/|sql/)'; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install tools
        if: steps.changes.outputs.has_changes == 'true'
        run: pip install ruff mypy pytest pytest-asyncio
      - name: Install backend deps
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          fi
          if [ -f backend/requirements-dev.txt ]; then
            pip install -r backend/requirements-dev.txt
          fi
      - name: Ruff lint
        if: steps.changes.outputs.has_changes == 'true'
        run: ruff check backend/ --output-format=github
      - name: Ruff format
        if: steps.changes.outputs.has_changes == 'true'
        run: ruff format --check backend/
      - name: Type check
        if: steps.changes.outputs.has_changes == 'true'
        run: mypy backend/ --ignore-missing-imports --no-error-summary || true
      - name: Run tests
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if [ -d backend/tests ] && [ "$(ls -A backend/tests/*.py 2>/dev/null)" ]; then
            cd backend && python -m pytest tests/ -v
          else
            echo "No backend tests yet — skipping"
          fi
      - name: SQL injection check
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if grep -rn --include='*.py' -E "(f['\"].*\b(SELECT|INSERT|UPDATE|DELETE)\b|\.format\(.*\b(SELECT|INSERT|UPDATE|DELETE)\b)" backend/ --exclude-dir=__pycache__ 2>/dev/null; then
            echo "::error::Potential SQL injection — use parameterized queries"
            exit 1
          fi

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check for frontend changes
        id: changes
        run: |
          if git diff --name-only origin/main...HEAD | grep -qE '^frontend/'; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Install dependencies
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if [ -f frontend/package-lock.json ]; then
            cd frontend && npm ci
          elif [ -f frontend/package.json ]; then
            cd frontend && npm install
          else
            echo "No frontend package.json yet"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Lint
        if: steps.changes.outputs.has_changes == 'true'
        run: cd frontend && npx eslint src/ 2>/dev/null || echo "ESLint not configured yet"
      - name: Type check
        if: steps.changes.outputs.has_changes == 'true'
        run: cd frontend && npx tsc --noEmit 2>/dev/null || echo "TypeScript not configured yet"
      - name: Tests
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if [ -f frontend/vitest.config.ts ] || [ -f frontend/vitest.config.js ]; then
            cd frontend && npx vitest run
          else
            echo "No vitest config yet — skipping"
          fi

  data-integrity:
    name: Data Integrity Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for data/sql changes
        id: changes
        run: |
          if git diff --name-only origin/main...HEAD | grep -qE '(sync/|sql/|scripts/)'; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Verify SRID consistency
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if grep -rn --include='*.sql' --include='*.py' -P 'SRID\s*[=,]\s*(?!4326)\d{4,}' . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=venv 2>/dev/null; then
            echo "::error::Non-4326 SRID detected — all geometry must be EPSG:4326"
            exit 1
          fi
          echo "SRID check passed"
      - name: Verify outSR in ArcGIS calls
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          ARCGIS_CALLS=$(grep -rn --include='*.py' -l 'FeatureServer\|arcgis' . --exclude-dir=.git --exclude-dir=venv 2>/dev/null || true)
          if [ -n "$ARCGIS_CALLS" ]; then
            for f in $ARCGIS_CALLS; do
              if ! grep -q 'outSR.*4326\|"outSR".*"4326"' "$f"; then
                echo "::warning::$f contains ArcGIS calls but no outSR=4326"
              fi
            done
          fi

  pr-format:
    name: PR Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          PATTERN='^(feat|fix|refactor|test|docs|ci|chore|perf|security)\((frontend|backend|pipeline|db|infra|ci|docs)\): .+'
          if ! echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "::error::PR title must follow: type(scope): description"
            echo "Got: $PR_TITLE"
            echo "Types: feat|fix|refactor|test|docs|ci|chore|perf|security"
            echo "Scopes: frontend|backend|pipeline|db|infra|ci|docs"
            exit 1
          fi
      - name: Validate PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ] || [ ${#PR_BODY} -lt 50 ]; then
            echo "::error::PR body is too short — use the PR template"
            exit 1
          fi
